name: Build foliSDK Toolchain

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: false

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4
      with:
        submodules: recursive 
        fetch-depth: 1

    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          bison \
          flex \
          texinfo \
          wget \
          tar \
          tcl \
          help2man \
          autoconf \
          automake \
          autoconf-archive \
          pkg-config \
          autopoint \
          libssl-dev \
          dpkg-dev

    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install texinfo wget gnu-getopt autoconf automake libtool tcl-tk help2man
        echo "$(brew --prefix texinfo)/bin" >> $GITHUB_PATH

    - name: Debug - SSH into runner
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: true

    - name: Run Build Script
      run: |
        python3 build.py --arch x86_64

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: folisdk-${{ runner.os }}-${{ github.run_id }}
        path: |
          build/folisdk-host.tar.gz
          build/folisdk-x86_64.tar.gz
        retention-days: 5
